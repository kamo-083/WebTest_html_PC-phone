<!-- Unityを使ったPCとスマホの連動テスト -->

<!DOCTYPE html>
<html lang="ja">
    <head>
  <meta charset="utf-8">
  <title>WS Test</title>

  <!-- CSS関連 -->
  <style>
  body {
    margin: 0;
    padding: 16px;
    font-family: sans-serif;
  }
  button {
    width: 100%;
    min-height: 90px;
    font-size:32px;
    margin-bottom: 12px;
  }
  #log {
    font-size: 18px;
    margin-top: 16px;
    word-break: break-word;
  }
</style>
</head>
<body>
  <button id="connect">接続</button>
  <button id="send">送信</button>
  <button id="up">上</button>
  <button id="down">下</button>
  <div id="log"></div>

  <script>
    let ws = null;
    const log = (msg) => {
      document.getElementById("log").innerHTML += msg + "<br>";
      console.log(msg);
    };

    document.getElementById("connect").onclick = () => {
      ws = new WebSocket("ws://172.24.63.16:8080/");
      /*
       "ws://○○:××" 
         ○○: サーバーのIPアドレスやドメイン名。自分自身なら"localhost"
         ××: サーバーがWebSocket通信を待ち受けているポート番号
      */

      ws.onopen = () => log("connected");
      ws.onmessage = (e) => log("message: " + e.data);
      ws.onerror = (e) => log("error");
      ws.onclose = () => log("closed");
    };

    document.getElementById("send").onclick = () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send("hello from browser");
        log("sent: hello from browser");
      } else {
        log("not connected");
      };

      document.getElementById("up").onclick = () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send("up");
          log("sent: up");
        } else {
          log("not connected");
        }
      };

      document.getElementById("down").onclick = () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send("down");
          log("sent: down");
        } else {
          log("not connected");
        }
      };
    };
  </script>
</body>
</html>
